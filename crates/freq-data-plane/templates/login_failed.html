<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login Failed</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">
    <h1 class="text-xl font-semibold text-center mb-6">Sign In</h1>
    <p class="text-red-600 text-sm text-center mb-4">Invalid username or password.</p>
    <form method="post" action="/login">
      <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
      <input id="username" name="username" type="text" required autofocus
             class="w-full px-3 py-2 mb-4 border border-gray-300 rounded-md text-base focus:outline-none focus:ring-2 focus:ring-blue-500">
      <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <input id="password" name="password" type="password" required
             class="w-full px-3 py-2 mb-4 border border-gray-300 rounded-md text-base focus:outline-none focus:ring-2 focus:ring-blue-500">
      <button type="submit"
              class="w-full py-2 bg-blue-600 text-white rounded-md text-base font-medium hover:bg-blue-700 transition-colors">
        Log in
      </button>
    </form>
    <p class="mt-4 text-xs text-gray-500 text-center">Default: <code>admin</code> / <code>admin</code></p>
  </div>
</body>
</html>
